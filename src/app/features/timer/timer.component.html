<div class="timer-container" [attr.data-warning]="warningLevel()">
  <div class="timer-display">
    <div class="timer-icon">⏱️</div>
    <div class="timer-content">
      <div class="time-remaining">{{ formattedTime() }}</div>
      <div class="time-label">remaining</div>
    </div>
  </div>

  <div class="progress-bar">
    <div
      class="progress-fill"
      [style.width.%]="(timeRemaining() / 60) * 100"
      [attr.data-warning]="warningLevel()"
    ></div>
  </div>

  @if (warningLevel() === 'critical') {
    <div class="warning-message">⚠️ Time is running out!</div>
  }
</div>
